<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWA 状态面板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; background: #f5f5f5; color: #333; }
    .panel { background: #fff; padding: 16px; border-radius: 12px; margin: 12px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #FF8A80; margin-bottom: 16px; font-size: 20px; }
    h3 { color: #666; margin-bottom: 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
    .item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
    .item:last-child { border-bottom: none; }
    .item .icon { width: 24px; margin-right: 12px; font-size: 18px; }
    .ok { color: #34C759; }
    .fail { color: #FF3B30; }
    .warn { color: #FF9500; }
    pre { background: #f8f8f8; padding: 12px; border-radius: 8px; font-size: 11px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
    button { background: #FF8A80; color: #fff; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 16px; }
    button:active { background: #ff6b62; }
    .loading { text-align: center; padding: 40px; color: #999; }
    .cache-name { font-weight: 600; color: #333; margin: 8px 0 4px; }
    .cache-count { color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <h1>🏯 PWA 状态面板</h1>

  <div id="content">
    <div class="loading">正在检查 PWA 状态...</div>
  </div>

  <button onclick="location.reload()">🔄 刷新页面</button>

  <script src="sw-status.js"></script>
</body>
</html>
